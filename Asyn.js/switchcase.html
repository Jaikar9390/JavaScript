<script>
  let Name = prompt("Enter your name");

  let Marks = prompt("Enter your marks");

  switch (true) {
    case Marks > 90 && Marks <= 100:
      result = "Great you are the topper";
      break;

    case Marks > 65 && Marks <= 90:
      result = "Congrats you got first class";
      break;

    case Marks >= 40 && Marks <= 65:
      result = "You got second class";
      break;

    case Marks >= 30 && Marks < 40:
      result = "You got third class";
      break;

    case Marks < 30:
      result = "Sorry you failed ,Better next time";
      break;
  }
  document.write("Hello " + Name + " your " + result);
</script>
